 feet skin intact, no ulcers; 10-g monofilament intact bilaterally; DP pulses 2+."},IMMUNIZATIONS:[{name:"Influenza (2025\u201326)",status:"Administered 10/14/2025",flag:"normal",date:"10/14/2025",route:"IM",site:"L deltoid",lot:"FL7732",mfr:"Sanofi"},{name:"COVID-19 (2025\u201326)",status:"Administered 09/30/2025",flag:"normal",date:"09/30/2025",route:"IM",site:"R deltoid",lot:"CV5521",mfr:"Pfizer"},{name:"Pneumococcal (PCV20)",status:"Due \u2014 age/diabetes indicated",flag:"due"},{name:"Zoster (Shingrix)",status:"Due \u2014 age \u226550",flag:"due"},{name:"Tdap",status:"Overdue \u2014 last 06/12/2015 (q10yr)",flag:"overdue",date:"06/12/2015"}],SUBJECTIVE_DOCUMENTED:[{label:"Reason for referral",value:"PCP referral for persistently elevated office BP and worsening glycemic control."},{label:"Chief Complaint (CC)",value:'Reports doctor noted BP and diabetes "numbers creeping up."'},{label:"PMH",value:"HTN, T2DM, hyperlipidemia, obesity, bilateral knee OA."},{label:"Documented symptoms",value:"No acute complaints documented at intake."}],DOCUMENTED_PMH:[{condition:"Hypertension",onset:"2016",icd10:"I10"},{condition:"Type 2 diabetes mellitus",onset:"2018",icd10:"E11.9"},{condition:"Hyperlipidemia",onset:"2019",icd10:"E78.5"},{condition:"Obesity",onset:"2015",icd10:"E66.9"},{condition:"Bilateral knee osteoarthritis",onset:"2020",icd10:"M17.0"}],DOCUMENTED_META:{by:"Intake RN",when:"06/23/2026 08:50",encounter:"Initial Ambulatory Care Pharmacist Visit"},OBJECTIVE_EXTRA:[{label:"General",value:"Well-appearing, in no acute distress (intake note)."},{label:"Documented home BP log",value:"None on file",flag:"missing"},{label:"Documented SMBG log",value:"None on file",flag:"missing"},{label:"UACR",value:"Not obtained",flag:"missing"}],INTERVIEW_FIELDS:[{key:"currentMeds",label:"Current medication use / doses",placeholder:"What is she actually taking, and how?"},{key:"adherence",label:"Medication adherence",placeholder:"Missed doses? How often? Barriers?"},{key:"otc",label:"OTC / supplements / NSAID use",placeholder:"Ask specifically about OTC pain relievers…"},{key:"sideEffects",label:"Side effects",placeholder:"Any medication-related symptoms?"},{key:"homeBp",label:"Home BP readings",placeholder:"Typical readings if she checks at home…"},{key:"bpTechnique",label:"Home BP technique",placeholder:"How does she actually measure it?"},{key:"glucoseMonitoring",label:"Home glucose monitoring",placeholder:"How often? Typical fasting values?"},{key:"diet",label:"Diet & sodium intake",placeholder:"Eating pattern, restaurant meals, sweet tea, salt…"},{key:"exercise",label:"Physical activity",placeholder:"Frequency, duration, barriers…"},{key:"weightGoals",label:"Weight goals",placeholder:"Motivation and goals around weight…"},{key:"familyHistory",label:"Family history",placeholder:"Relevant family history…"},{key:"diseaseUnderstanding",label:"Disease / A1C understanding",placeholder:"What does she understand about A1C and her conditions?"},{key:"concerns",label:"Patient concerns & goals",placeholder:"What worries her most?"},{key:"cost",label:"Cost / access",placeholder:"Any cost or refill barriers?"}],INTERVIEW_KNOWLEDGE:[{id:"reason",topic:"Reason for visit",field:null,keywords:["why are you here","reason for","bring you in","what brings","referred","doctor send","visit today","here today","hoping to get","hope to get out","get out of today"],response:"My doctor said my blood pressure and diabetes numbers have been getting worse and wanted me to meet with you. I'd like to get things under control — and hopefully lose some weight too."},{id:"symptoms",topic:"Symptoms",field:null,keywords:["symptom","how have you been feeling","how do you feel","feeling lately","headache","dizzy","dizziness","chest pain","short of breath","shortness of breath","blurry vision","thirst","thirsty","urination","more tired","fatigue"],response:"Pretty normal overall — maybe a little more tired than I used to be. No headaches, dizziness, chest pain, or shortness of breath. Sometimes I'm thirstier than I used to be, but I haven't thought much about it."},{id:"currentMeds",topic:"Current medications",field:"currentMeds",keywords:["what medicine","what medication","what are you taking","list your med","which pills","go over your med","current medication","medications are you","how are you taking"],response:"I take metformin, lisinopril, hydrochlorothiazide, and Tylenol sometimes. I take the metformin with dinner and my blood pressure medicines in the morning."},{id:"adherence",topic:"Medication adherence",field:"adherence",keywords:["miss","missed","forget","forgot","adheren","compliance","routine","medication schedule","daily medication","consistency","doses","taking medication","remember","pill box","pill organizer","skip doses","every day"],response:"Honestly, I probably miss my medications two or three times a week. Usually it's because my mornings get hectic and I realize later that I forgot."},{id:"sideEffects",topic:"Side effects",field:"sideEffects",keywords:["side effect","bother you","tolerate","upset stomach","stomach","cough","problems with the med","reaction to the med"],response:"Not really. I had some stomach issues when I first started metformin, but not anymore — and no cough from the lisinopril."},{id:"otc",topic:"OTC / NSAIDs / supplements",field:"otc",keywords:["over the counter","otc","ibuprofen","advil","motrin","aleve","naproxen","pain reliever","pain medicine","pain medication","nonprescription","knee pain","arthritis","supplement","vitamin","multivitamin","anything else you take","medications not on"],response:"I take ibuprofen a few times a week for my knees — usually two or three tablets. I don't really count that as a medicine, it's just something I grab over the counter. I take a multivitamin sometimes too."},{id:"bpTechnique",topic:"BP measurement technique",field:"bpTechnique",keywords:["how do you check","technique","cuff","monitor","position","feet","legs","cross your legs","rest before","rest first","sit when","arm position","before you check","walk me through how you check"],response:"I usually sit down and check it after I've been moving around the house. Sometimes I cross my legs because it's more comfortable, and my feet aren't always flat on the floor."},{id:"homeBp",topic:"Home BP readings",field:"homeBp",keywords:["home blood pressure","check your blood pressure","bp at home","readings at home","monitor your pressure","numbers at home","what numbers"],response:"When I do check it at home, it's usually in the 140s over 90s, somewhere around there."},{id:"glucoseMonitoring",topic:"Home glucose monitoring",field:"glucoseMonitoring",keywords:["blood sugar","glucose","check your sugar","monitor your sugar","monitor glucose","smbg","finger stick","fingerstick","meter","glucometer","checking sugars","fasting","sugars at home","how often do you check your sugar"],response:"Honestly, I only check once or twice a week. In the mornings it's usually somewhere around 160 to 180 — I just forget to check more often."},{id:"diet",topic:"Diet",field:"diet",keywords:["eat","diet","food","meals","breakfast","lunch","dinner","sweet tea","drink","restaurant","eat out","cook","typical day of eating"],response:"Most days I skip breakfast, lunch is whatever's quick at work, and dinner depends on what's going on at home. We eat out three or four times a week, and I do love my sweet tea — a few times a week."},{id:"sodium",topic:"Sodium intake",field:"diet",keywords:["salt","sodium","salty"],response:"Salt? No, I've never really paid much attention to that, to be honest."},{id:"exercise",topic:"Physical activity",field:"exercise",keywords:["exercise","activity","physical activity","walk","workout","active","move around","how often do you exercise"],response:"I walk sometimes — maybe once or twice a week. After work I'm tired, and my knees bother me, so it's hard to do more."},{id:"weightGoals",topic:"Weight goals",field:"weightGoals",keywords:["weight","lose weight","losing weight","your weight","goal weight","health goals","goals","motivation","priorities"],response:"I'd really like to lose weight — that's the thing I care about most. I just haven't figured out how."},{id:"familyHistory",topic:"Family history",field:"familyHistory",keywords:["family history","your mother","your mom","family member","parents","runs in your family"],response:"My mom had diabetes and ended up with kidney problems. I don't want diabetes complications like she had."},{id:"a1c",topic:"A1C understanding",field:"diseaseUnderstanding",keywords:["a1c","hemoglobin","what does a1c","know what a1c","your a1c mean","about your a1c"],response:"The A1C? I hear the doctor say the number, but I really don't know what it actually means."},{id:"diseaseUnderstanding",topic:"Disease understanding",field:"diseaseUnderstanding",keywords:["understand","what do you know about","know about your","disease","health literacy","well controlled","is your diabetes controlled","high blood pressure","about diabetes"],response:"I know high blood pressure is bad for your heart, and I know my blood sugar is high — but I feel okay most days, so I'm honestly not sure how serious it is."},{id:"concerns",topic:"Concerns & goals",field:"concerns",keywords:["worry","worried","concern","afraid","scared","insulin","fear","what concerns you","most about your health"],response:"Probably ending up needing insulin — it feels like once you get to that point, things are getting serious. And I worry about my kidneys, like what happened to my mom."},{id:"readiness",topic:"Readiness to change",field:null,keywords:["motivated","motivation","ready to change","make changes","realistic change","willing to change"],response:"I'm pretty motivated right now. I could probably walk more and cut back on sweet tea."},{id:"cost",topic:"Cost / access",field:"cost",keywords:["cost","afford","insurance","pay for","refill","expensive","trouble paying","skip to save","save money"],response:"No, cost isn't really a problem — I have insurance through work, and I've never skipped medications to save money."},{id:"allergies",topic:"Allergies",field:null,keywords:["allergy","allergic","allergies","medication allergy"],response:"No, I don't have any medication allergies."},{id:"followup",topic:"Follow-up",field:null,keywords:["follow up","come back","next visit","see you again","schedule","prefer follow"],response:"Whatever's easiest — phone visits are nice if that's possible."},{id:"tobacco",topic:"Tobacco use",field:"sh_tobacco",keywords:["smoke","do you smoke","smoking","smoked","cigarette","cigarettes","tobacco","vape","vaping","nicotine","cigar","chewing tobacco","quit smoking"],response:"No, I've never been a smoker — no cigarettes and no vaping."},{id:"alcohol",topic:"Alcohol use",field:"sh_alcohol",keywords:["alcohol","drink alcohol","any alcohol","drinking","drinks","beer","wine","liquor","cocktail","socially","weekend drinking"],response:"No, I don't really drink alcohol — it's just never been part of my routine."},{id:"caffeine",topic:"Caffeine",field:"sh_caffeine",keywords:["caffeine","caffeinated","energy drink","drink coffee","cup of coffee","how much coffee","how much caffeine"],response:"My main source of caffeine is sweet tea — I have it a few times a week. I'm not really a coffee drinker."}],ASSESSMENT_CARDS:[{id:"htn",group:"problem",icd10:"I10",title:"Essential hypertension",icon:"HeartPulse",color:"13314f",questions:[{key:"htn_class",q:"How is her office BP classified, and what is her target given diabetes?"},{key:"htn_adhere",q:"What should you assess about adherence and technique before intensifying therapy?"},{key:"htn_contrib",q:"What contributors (lifestyle, OTC) might be raising her BP?"},{key:"htn_reg",q:"Is her current 2-drug regimen optimized? What are the options?"},{key:"htn_monitor",q:"What monitoring is needed if you change ACEi/diuretic dosing?"}]},{id:"t2dm",group:"problem",icd10:"E11.9",title:"Type 2 diabetes mellitus",icon:"Droplet",color:"0d9488",quest addressed at this visit?"}]},{id:"knee",group:"problem",icd10:"M17.0",title:"Bilateral knee osteoarthritis",icon:"Activity",color:"475569",questions:[{key:"knee_analgesia",q:"How should her knee OA analgesia be chosen given CKD/BP risk \u2014 acetaminophen vs the patient-reported NSAID (ibuprofen)?"},{key:"knee_nonpharm",q:"What weight-related and non-pharmacologic strategies could reduce her knee pain and NSAID reliance?"}]}],PLAN_SECTIONS:[{id:"htn_plan",title:"Hypertension",options:[{key:"h1",label:"Assess and reinforce adherence and home BP technique before intensifying",correct:!0},{key:"h2",label:"Increase lisinopril to 20 mg daily",correct:!0},{key:"h3",label:"Initiate home BP monitoring with correct technique",correct:!0},{key:"h4",label:"Immediately add a fourth antihypertensive today",correct:!1},{key:"h5",label:"Stop the ACE inhibitor because BP is still high",correct:!1}]},{id:"dm_plan",title:"Diabetes",options:[{key:"d1",label:"Increase metformin XR toward 2000 mg daily as tolerated",correct:!0},{key:"d2",label:"Order UACR",correct:!0},{key:"d3",label:"Reinforce SMBG and lifestyle; recheck A1C in ~3 months",correct:!0},{key:"d4",label:"Start basal insulin today",correct:!1},{key:"d5",label:"Stop metformin due to A1C rise",correct:!1}]},{id:"lipid_plan",title:"Lipid / ASCVD",options:[{key:"l1",label:"Initiate a statin (e.g., atorvastatin) given diabetes age 40–75",correct:!0},{key:"l2",label:"Counsel on statin benefit and monitoring",correct:!0},{key:"l3",label:"Defer all lipid therapy until BP is controlled",correct:!1},{key:"l4",label:"Start a fibrate first-line for TG 223",correct:!1}]},{id:"life_plan",title:"Lifestyle / Weight",options:[{key:"lf1",label:"Set a realistic, patient-centered weight goal",correct:!0},{key:"lf2",label:"DASH-style diet, reduce sweet tea and sodium",correct:!0},{key:"lf3",label:"Gradually increase walking within knee tolerance",correct:!0},{key:"lf4",label:"Recommend a strict 1200-kcal diet immediately",correct:!1}]},{id:"mon_plan",title:"Monitoring",options:[{key:"m1",label:"Recheck BMP (K, SCr) after ACEi titration",correct:!0},{key:"m2",label:"A1C in ~3 months; UACR result review",correct:!0},{key:"m3",label:"No additional monitoring needed",correct:!1}]},{id:"imm_plan",title:"Immunizations / Preventive",options:[{key:"i1",label:"Address pneumococcal and Tdap (overdue ~11 yr)",correct:!0},{key:"i2",label:"Offer Shingrix per age eligibility",correct:!0},{key:"i3",label:"No vaccines indicated",correct:!1}]},{id:"fu_plan",title:"Follow-up",options:[{key:"f1",label:"Follow up ~1 month after medication adjustment",correct:!0},{key:"f2",label:"Return in 1 year",correct:!1}]}],PLAN_FREETEXT:[{key:"patientEducation",label:"Patient education plan",placeholder:"Plain-language teaching points and teach-back items…"},{key:"followUp",label:"Follow-up plan",placeholder:"Timing, what to recheck, what to bring…"},{key:"questionsPatient",label:"Questions for the patient",placeholder:"What still needs clarifying?"},{key:"questionsProvider",label:"Questions for provider / preceptor",placeholder:"Collaborative practice items to confirm…"}],GUIDING_QUESTIONS:["What is Maria’s BP classification, and what target applies given her diabetes?","Before increasing any dose, what should you confirm about how she takes and measures things at home?","What OTC product might she be taking that affects both BP and kidneys — and would she even mention it unprompted?",'Her A1C is 8.2% and rising. Is that "uncontrolled," and what is her trend telling you?',"What single diabetes monitoring test is missing from her chart entirely?","Does a 54-year-old with diabetes meet a statin indication regardless of LDL?","How might her knee pain be driving a hidden risk to her kidneys and BP?","What lifestyle factors surfaced only when you interviewed her?","How soon should she return after a medication change, and why?","What does she actually understand about her A1C, and how would you explain it simply?"],COUNSELING:[{id:"bp",title:"Blood pressure",body:["Your blood pressure is a bit high right now. Our goal is to get the top number under about 130 and the bottom under 80.","Taking your pills the same time every day — like with breakfast — helps a lot.","We’ll also work on checking it correctly at home so the numbers are accurate."]},{id:"homebp",title:"Home BP monitoring",body:["Before you check: sit quietly for 5 minutes, feet flat, back supported, don’t cross your legs.","Rest your arm on a table at heart level, and don’t talk during the reading.","Avoid checking right after walking, coffee, or activity. Write down the numbers to bring in."]},{id:"dm",title:"Diabetes & A1C",body:['The A1C is like an average of your sugar over the past 3 months — it’s a "big picture" number.',"Checking your finger-stick sugar a few mornings a week helps us see your day-to-day pattern.","Small steps — less sweet tea, a little more walking — add up over time."]},{id:"adherence",title:"Medication adherence",body:["Missing a couple of doses a week can make a real difference in your numbers.","Let’s find a routine that sticks — like keeping pills next to something you use every morning.","There’s no judgment here; tell me honestly what gets in the way so we can fix it together."]},{id:"nsaid",title:"OTC pain relievers (NSAIDs)",body:["Over-the-counter ibuprofen counts as a medicine, even though you buy it without a prescription.","Used often, it can raise blood pressure and stress the kidneys, especially with your BP pills.","Acetaminophen (Tylenol) is usually safer for your knees — let’s talk about how much you use."]},{id:"lifestyle",title:"Lifestyle / DASH / sodium",body:["A DASH-style plate — more vegetables, fruit, and whole grains, less salt — helps both BP and sugar.","Restaurant food is often very salty; even small swaps help.","Sweet tea has a lot of sugar — cutting back even a little can help your A1C."]}],PRECEPTOR:{keyIssues:["Stage 2 hypertension (≥140/≥90) in a patient with diabetes; BP goal <130/80.","T2DM with A1C 8.2% and a clear 12-month upward trend despite metformin monotherapy.","No statin in a 54-year-old with diabetes (statin indication age 40–75).","UACR never obtained — required in diabetes + HTN.","Hidden drivers: nonadherence 2–3x/week, frequent OTC NSAID use, poor home BP technique."],assessment:["BP is Stage 2 by AHA/ACC classification; do NOT escalate aggressively before confirming adherence and technique.","A1C above individualized goal and trending up — optimize metformin (dose can increase toward 2000 mg) before assuming need for injectables.","Diabetes age 40–75 supports statin initiation independent of LDL value.","UACR is the missing data point and changes long-term risk stratification.","NSAID use can blunt antihypertensive response and add kidney risk."],plan:["Reinforce adherence + correct home BP technique; start a home BP log.","Increase lisinopril to 20 mg daily; recheck BMP (K, SCr) after titration.","Increase metformin XR toward 2000 mg daily as tolerated; order UACR; recheck A1C in ~3 months.","Initiate moderate-intensity statin (e.g., atorvastatin 20 mg).","DASH-style diet, reduce sweet tea/sodium, gradual walking within knee tolerance.","Address pneumococcal, Tdap (overdue), Shingrix; follow up in ~1 month."],pearls:["Always assess adherence and measurement technique BEFORE intensifying therapy.",'Ask specifically about OTC products — patients often don’t consider ibuprofen a "medication."',"A rising A1C trend is more informative than a single value.","In diabetes, statin indication is driven by age/diabetes, not just LDL."],mistakes:["Adding a new antihypertensive before checking adherence and home BP technique.","Missing the hidden NSAID use entirely (only found by interview).","Overlooking the missing UACR.","Failing to recognize the statin indication.","Treating the A1C number in isolation without the trend or lifestyle context."],followupQuestions:["If you increase lisinopril, what lab do you recheck and when?","How would you explain A1C to Maria in one sentence?","Why does her ibuprofen use matter for both BP and kidneys?",'What would you say to a student who wants to "just add another BP pill" today?'],checklist:["Asked about missed doses / adherence","Asked specifically about OTC / NSAIDs","Asked about home BP technique","Asked about home glucose values","Identified missing UACR","Identified statin indication","Set realistic lifestyle goals","Planned ~1 month follow-up"]},INTERVIEW_SYSTEM_PROMPT:"You are Maria Gonzalez, a 54-year-old friendly, polite, cooperative woman with hypertension, type 2 diabetes, obesity, and knee arthritis. You want to be healthier but feel overwhelmed by conflicting information and sometimes minimize unhealthy habits out of embarrassment. Speak in plain, conversational, non-clinical language. Never use guideline or clinical terminology. Do NOT volunteer hidden facts (missed doses, ibuprofen use, poor BP technique, infrequent glucose checks, diet, fears) unless the student specifically asks about that topic. Keep answers short and natural."},uf={id:"maria-wed",NOTE_META:{author:"Alex Rivera, PharmD Candidate (APPE)",preceptor:"M. Whitfield, PharmD, BCACP",dateTime:"Wednesday, Week 1 · 10:30"},PATIENT:Go,ENCOUNTER:{day:"Wednesday",type:"3-Month Ambulatory Care Follow-Up",week:"Week 1 — Wednesday",length:"30-minute collaborative practice visit",difficulty:"Intermediate APPE Student",difficultyTone:"amber",diseaseStates:["Hypertension","Type 2 Diabetes","Albuminuria / CKD risk","Hyperlipidemia"],chiefConcern:"I think things are getting a little better, but I’m not sure if I’m where I need to be yet.",snapshotSummary:"3-month follow-up after medication adjustments. BP and A1C improved but remain above goal; first UACR returns elevated. Decision point on kidney/cardiovascular-protective therapy.",learningObjectives:["Interpret partial treatment response without treating it as failure","Recognize moderately increased albuminuria and its impact on therapy choice","Weigh SGLT2 inhibitor vs GLP-1 RA for cardiorenal and weight benefit","Continue adherence/lifestyle support and renal monitoring"],priorChanges:["Lisinopril increased 10 → 20 mg daily","Metformin XR increased 1000 → 2000 mg daily","Atorvastatin 20 mg daily initiated","UACR ordered; lifestyle + adherence interventions begun"]},VITALS:{spo2:"98 %",pain:"1/10 (knees)",vitalsTime:"06/24/2026 09:05",trends:{bpSys:[142,139,136],weight:[91.1,90.3,89.5]},bp:"136/84 mmHg",bpRepeat:"134/82 mmHg",hr:"76 bpm",rr:"16",temp:"98.4 °F",weight:"89.5 kg",height:`5'4"`,bmi:"33.8 kg/m²",flags:{bp:"warn",bpRepeat:"warn",bmi:"warn",hr:"normal"},extras:[{label:"Weight change",value:"−2.5 kg since prior visit",flag:"normal"},{label:"Home BP average",value:"134/82 mmHg (documented)",flag:"warn"},{label:"Home BP range",value:"128–140 / 78–86 mmHg",flag:"warn"},{label:"Home BP technique",value:"Appears appropriate per log",flag:"normal"}]},LABS:[{label:"A1C",value:"7.5",unit:"%",flag:"warn",note:"Improved from 8.2%",drawn:"06/24/2026 07:50",trend:[8.6,8.0,7.5]},{label:"Na",value:"138",unit:"mmol/L",flag:"normal",drawn:"06/24/2026 07:50"},{label:"K",value:"4.4",unit:"mmol/L",flag:"normal",drawn:"06/24/2026 07:50"},{label:"SCr",value:"0.95",unit:"mg/dL",flag:"normal",note:"Slight rise (expected after ACEi titration)",drawn:"06/24/2026 07:50"},{label:"eGFR",value:"74",unit:"mL/min/1.73m²",flag:"normal",drawn:"06/24/2026 07:50"},{label:"UACR",value:"45",unit:"mg/g",flag:"warn",note:"NEW — moderately increased albuminuria (A2)",drawn:"06/24/2026 07:50"},{label:"Total cholesterol",value:"170",unit:"mg/dL",flag:"normal",drawn:"06/24/2026 07:50"},{label:"LDL-C",value:"78",unit:"mg/dL",flag:"normal",note:"Improved on statin",drawn:"06/24/2026 07:50"},{label:"HDL-C",value:"45",unit:"mg/dL",flag:"normal",drawn:"06/24/2026 07:50"},{label:"Triglycerides",value:"180",unit:"mg/dL",flag:"warn",drawn:"06/24/2026 07:50"}],ALERTS:[{level:"warn",rule:"Diabetic kidney screening — UACR",text:"NEW UACR 45 mg/ t:"2015",icd10:"E66.9"},{condition:"Bilateral knee osteoarthritis",onset:"2020",icd10:"M17.0"}],DOCUMENTED_META:{by:"Intake RN",when:"06/24/2026 08:45",encounter:"3-Month Ambulatory Care Follow-Up"},OBJECTIVE_EXTRA:[{label:"General",value:"Well-appearing, no acute distress."},{label:"Documented SMBG log",value:"Not submitted at intake",flag:"missing"},{label:"Albuminuria understanding",value:"Not documented",flag:"missing"},{label:"Preference re: injectable therapy",value:"Not documented",flag:"missing"}],INTERVIEW_FIELDS:[{key:"adherence",label:"Medication adherence",placeholder:"Improved? Which med missed most often?"},{key:"currentMeds",label:"Medication routine",placeholder:"When/how does she take each med?"},{key:"sideEffects",label:"Side effects",placeholder:"Any new symptoms on titrated doses?"},{key:"homeBp",label:"Home BP readings",placeholder:"Confirm values and technique…"},{key:"glucoseMonitoring",label:"Home glucose monitoring",placeholder:"Typical fasting values now…"},{key:"diet",label:"Diet changes",placeholder:"Sweet tea, cooking at home, restaurant meals…"},{key:"exercise",label:"Physical activity",placeholder:"Frequency and duration now…"},{key:"weightGoals",label:"Weight goals & motivation",placeholder:"How does she feel about progress?"},{key:"albuminuria",label:"Albuminuria / kidney understanding",placeholder:"What does she understand about urine protein?"},{key:"injectionPref",label:"Injectable therapy preference",placeholder:"Open to a once-weekly injection?"},{key:"glp1",label:"Weight-loss medication interest",placeholder:"Interested in a med that helps weight?"},{key:"concerns",label:"Concerns & goals",placeholder:"Kidney worries, weight, etc."},{key:"cost",label:"Cost / access",placeholder:"Any refill or cost barriers?"}],INTERVIEW_KNOWLEDGE:[{id:"reason",topic:"Reason for visit",field:null,keywords:["why are you here","reason for","what brings","follow up","here today","how have things been","how do you think things","see if"],response:"I'm here for my follow-up to see if the changes we made are helping. I think things are better than before, but I'm not sure if they're where they should be."},{id:"symptoms",topic:"Symptoms",field:null,keywords:["symptom","how have you been feeling","how do you feel","dizzy","dizziness","lightheaded","chest pain","short of breath","shortness of breath","swelling","low blood sugar","low sugar","hypoglycemia"],response:"Pretty good overall — no dizziness, no chest pain, no shortness of breath, no swelling, and no low-sugar episodes."},{id:"currentMeds",topic:"Medication routine",field:"currentMeds",keywords:["what medication","what are you taking","walk me through how you","list your med","which pills","go over your med","medication routine","how are you taking"],response:"I take the metformin with dinner, my blood pressure medicines in the morning, and the cholesterol pill at night."},{id:"statinStarted",topic:"Atorvastatin started",field:"currentMeds",keywords:["have you started","started the atorvastatin","start the statin","taking the statin","started the cholesterol","on the statin"],response:"Yes, I started the atorvastatin — I take it at night."},{id:"statinAdherence",topic:"Atorvastatin adherence",field:"adherence",keywords:["which one do you miss","miss most","forget most","statin","atorvastatin","lipitor","cholesterol medication","cholesterol pill","evening medication","night medication"],response:"The cholesterol pill is probably the one I forget most often."},{id:"adherence",topic:"Medication adherence",field:"adherence",keywords:["adheren","consistency","missed dose","how has adherence","miss","forget","forgot","routine","remember","still miss"],response:"Much better than before — but I still forget about once a week. I started keeping my medicines next to the coffee maker, which helps."},{id:"sideEffects",topic:"Side effects",field:"sideEffects",keywords:["side effect","bother you","tolerate","problems with the med","reaction to the med"],response:"No, I've tolerated everything pretty well."},{id:"homeBp",topic:"Home BP readings",field:"homeBp",keywords:["home blood pressure","check your blood pressure","bp at home","readings at home","numbers at home","what numbers","blood pressure been"],response:"Yes, I've been checking a lot more than before — mostly in the 130s over low 80s."},{id:"bpTechnique",topic:"BP technique",field:"homeBp",keywords:["how do you check","technique","changed how you check","feet","legs","rest first","rest before","not to talk"],response:"Yes, I changed it. I sit down and rest first now, I keep my feet flat on the floor, and I try not to talk while it's reading."},{id:"glucoseMonitoring",topic:"Home glucose monitoring",field:"glucoseMonitoring",keywords:["blood sugar","glucose","check your sugar","monitor your sugar","sugars at home","fasting","finger stick","fingerstick","glucometer","sugar been"],response:"I've been checking more often than before. They're usually around 130 to 150 in the morning — I think they've improved."},{id:"diet",topic:"Diet changes",field:"diet",keywords:["eat","diet","food","meals","sweet tea","drink","restaurant","cook","dietary change","hardest to change"],response:"I've cut back on sweet tea quite a bit — maybe once a week now — and we've been cooking at home more. The hardest part is eating healthy when work gets busy."},{id:"exercise",topic:"Physical activity",field:"exercise",keywords:["exercise","activity","walk","workout","active","move","how often"],response:"I've been walking more — about four days a week, usually around twenty minutes."},{id:"weightGoals",topic:"Weight goals & motivation",field:"weightGoals",keywords:["weight","lose weight","losing weight","your weight","more weight","progress","happy with"],response:"I'm happy I've lost a little, but I was hoping for more. Losing more weight is definitely important to me."},{id:"albuminuria",topic:"Albuminuria / kidney understanding",field:"albuminuria",keywords:["albuminuria","uacr","urine protein","urine test","kidney test","kidney damage","kidney function","protein in"],response:"I know it had something to do with my kidneys, but I don't really understand what it means. Nobody really explained the urine test to me."},{id:"kidneyConcern",topic:"Kidney concern",field:"concerns",keywords:["worried about your kidney","kidney problems","your mom","your mother","family history","scared about kidney","biggest health risk"],response:"Yes, I'm worried about my kidneys — my mom had kidney problems from her diabetes, and I think that's my biggest risk right now."},{id:"glp1",topic:"Weight-loss medication interest",field:"glp1",keywords:["weight loss medication","medication that could help with weight","obesity treatment","glp","semaglutide","ozempic","wegovy","tirzepatide","mounjaro","help with weight loss","medicine to lose weight"],response:"I'd definitely be interested if it could help with weight loss."},{id:"injectionPref",topic:"Injectable therapy preference",field:"injectionPref",keywords:["injection","injectable","shot","needle","weekly shot","once a week"],response:"I wouldn't love injections, but if it helped with weight loss and my diabetes, I'd consider it."},{id:"cost",topic:"Cost / access",field:"cost",keywords:["cost","afford","insurance","pay","refill","expensive"],response:"No, I don't have any problems affording my medications or getting refills."},{id:"followup",topic:"Follow-up",field:null,keywords:["follow up","come back","next visit","schedule","continue follow"],response:"Whatever you think is best."},{id:"tobacco",topic:"Tobacco use",field:"sh_tobacco",keywords:["smoke","do you smoke","smoking","smoked","cigarette","cigarettes","tobacco","vape","vaping","nicotine","cigar","chewing tobacco","quit smoking"],response:"No, I've never been a smoker — no cigarettes and no vaping."},{id:"alcohol",topic:"Alcohol use",field:"sh_alcohol",keywords:["alcohol","drink alcohol","any alcohol","drinking","drinks","beer","wine","liquor","cocktail","socially","weekend drinking"],response:"No, I don't really drink alcohol — it's just never been part of my routine."},{id:"caffeine",topic:"Caffeine",field:"sh_caffeine",keywords:["caffeine","caffeinated","energy drink","drink coffee","cup of coffee","how much coffee","how much caffeine"],response:"My main source of caffeine is sweet tea — I have it a few times a week. I'm not really a coffee drinker."}],ASSESSMENT_CARDS:[{id:"t2dm",group:"problem",icd10:"E11.9",title:"Type 2 diabetes mellitus",icon:"Droplet",color:"0d9488",questions:[{key:"dm_partial",q:"A1C dropped 8.2% → 7.5%. Is this success, failure, or partial response? Why?"},{key:"dm_goal",q:"Where does she stand relative to a typical <7% goal?"},{key:"dm_agent",q:"Given albuminuria and obesity, which agent class adds the most value now?"},{key:"dm_metf",q:"Should metformin continue at 2000 mg? Any renal concern at eGFR 74?"},{key:"dm_monitor",q:"What monitoring continues for diabetes at this stage?"}]},{id:"kidney",group:"problem",icd10:"R80.9",title:"Moderately increased albuminuria",icon:"FlaskConical",color:"0891b2",questions:[{key:"kid_interp",q:"How do you interpret UACR 45 mg/g with a normal eGFR?"},{key:"kid_priority",q:"How does albuminuria change your therapeutic priorities?"},{key:"kid_acei",q:"Is the ACE inhibitor appropriate, and what do you monitor on it?"},{key:"kid_sglt2",q:"What is the rationale for an SGLT2 inhibitor here?"}]},{id:"htn",group:"problem",icd10:"I10",title:"Essential hypertension",icon:"HeartPulse",color:"13314f",questions:[{key:"htn_resp",q:"BP improved to 134/82. At goal? What does her Home BP monitoring (Self-Management) tell you?"},{key:"htn_next",q:"Is additional antihypertensive therapy needed yet? What are the options?"},{key:"htn_renal",q:"How do you monitor renal function/potassium after the ACEi increase?"}]},{id:"lipid",group:"problem",icd10:"E78.5",title:"Hyperlipidemia",icon:"Activity",color:"dc2626",questions:[{key:"lip_resp",q:"LDL fell to 78 on atorvastatin. Continue, change, or stop?"},{key:"lip_tg",q:"How do you interpret residual TG 180?"}]},{id:"obesity",group:"problem",icd10:"E66.9",title:"Obesity",icon:"Scale",color:"ca8a04",questions:[{key:"ob_progress",q:"How do you frame −2.5 kg so it reinforces rather than discourages?"},{key:"ob_synergy",q:"How could a weight-beneficial agent align with her stated goals?"}]},{id:"knee",group:"problem",icd10:"M17.0",title:"Bilateral knee osteoarthritis",icon:"Activity",color:"475569",questions:[{key:"knee_analgesia",q:"How should her knee OA analgesia be chosen given CKD/BP risk \u2014 acetaminophen vs the patient-reported NSAID (ibuprofen)?"},{key:"knee_nonpharm",q:"What weight-related and non-pharmacologic strategies could reduce her knee pain and NSAID reliance?"}]}],PLAN_SECTIONS:[{id:"dm_plan",title:"Diabetes",options:[{key:"d1",label:"Continue metformin XR 2000 mg daily",correct:!0},{key:"d2",label:"Add an SGLT2 inhibitor for cardiorenal protection",correct:!0},{key:"d3",label:"Consider a GLP-1 RA for glycemia + weight (per preference)",correct:!0},{key:"d4",label:"Conclude treatment is failing and start basal insulin",correct:!1},{key:"d5",label:"Stop metformin because A1C is not <7%",correct:!1}]},{id:"kidney_plan",title:"Kidney Protection",options:[{key:"k1",label:"Continue ACE inhibitor; monitor SCr and K",correct:!0},{key:"k2",label:"SGLT2 inhibitor for albuminuria/CKD protection",correct:!0},{key:"k3",label:"Recheck UACR to confirm/track albuminuria",correct:!0},{key:"k4",label:"Stop the ACE inhibitor because UACR is elevated",correct:!1}]},{id:"htn_plan",title:"Hypertension",options:[{key:"h1",label:"Continue current antihypertensives; reinforce home monitoring",correct:!0},{key:"h2",label:"Reassess BP after any SGLT2 addition (mild BP lowering)",correct:!0},{key:"h3",label:"Add two new BP agents today regardless of response",correct:!1}]},{id:"lipid_plan",title:"Lipid / ASCVD",options:[{key:"l1",label:"Continue atorvastatin 20 mg (good response)",correct:!0},{key:"l2",label:"Stop id:"kidney",title:"Kidney protection / albuminuria",body:["A urine test showed a small amount of protein leaking — an early sign your kidneys need extra protection.","The good news: we have medicines that protect the kidneys, and your BP pill already helps.","Keeping blood pressure and sugar in range, and avoiding frequent ibuprofen, all protect your kidneys."]},{id:"sglt2",title:"SGLT2 inhibitor",body:["This is a once-daily pill that lowers sugar and also protects the kidneys and heart.","It can cause more urination at first and a small risk of yeast/urinary infections — keep the area clean and stay hydrated.","Tell us about any genital itching, or if you feel unwell or stop eating — rare but important."]},{id:"glp1",title:"GLP-1 receptor agonist",body:["This is usually a once-weekly injection that lowers sugar and often helps with weight.","Nausea is common at first and usually improves; we start low and go slow.","Many people find the pen easy to use — we’ll practice together."]},{id:"adherence",title:"Medication adherence",body:["You’ve made real progress keeping pills by the coffee maker — that’s a great system.","The cholesterol pill at night is the one you miss most; let’s pair it with something you always do at night."]},{id:"lifestyle",title:"Lifestyle progress",body:["Cutting sweet tea and cooking at home are exactly the changes that move your numbers.","Four walks a week is great — let’s build slowly from there."]}],PRECEPTOR:{keyIssues:["Partial but real response: A1C 8.2→7.5%, BP 146/92→134/82, −2.5 kg.","NEW UACR 45 mg/g = moderately increased albuminuria (A2) with normal eGFR.","Decision point: SGLT2 inhibitor (cardiorenal) and/or GLP-1 RA (glycemia + weight, ASCVD).","Statin working (LDL 78) — continue.","Adherence improved (misses ~weekly, usually the statin); technique now appropriate."],assessment:["Do not label partial improvement as treatment failure; reinforce and build on it.","Albuminuria shifts the priority toward kidney protection independent of A1C.","SGLT2 inhibitors provide kidney/HF/CV benefit; strongly relevant with A2 albuminuria.","GLP-1 RA aligns with weight loss, glycemic improvement, and ASCVD risk reduction; she is open to injection.","Continue ACE inhibitor; monitor SCr and potassium after titration."],plan:["Continue metformin 2000 mg; add SGLT2 inhibitor for cardiorenal protection.","Consider GLP-1 RA given weight goals and openness to once-weekly injection.","Continue lisinopril + atorvastatin; reinforce adherence and lifestyle wins.","Recheck BMP and UACR; A1C in ~3 months; follow up ~3 months.","Counsel on new agent(s); address pneumococcal/Tdap/Shingrix gaps."],pearls:["A2 albuminuria with normal eGFR still signals meaningful kidney risk.","Cardiorenal protection can drive agent choice independent of the A1C value.","Match the agent to the patient’s stated goals (weight) and preferences (injection ok).",'Reframe "only 2.5 kg" as durable, encouraging progress.'],mistakes:["Treating partial response as failure and over-escalating.","Ignoring the new albuminuria.","Choosing therapy on A1C alone, missing SGLT2/GLP-1 cardiorenal value.","Stopping the ACE inhibitor or the statin inappropriately.","Not asking about injectable preference before assuming barriers."],followupQuestions:["Why does UACR 45 change your plan even with a normal eGFR?","How would you choose between an SGLT2 inhibitor and a GLP-1 RA here?","What do you monitor after adding an SGLT2 inhibitor?","How do you keep Maria motivated about her weight progress?"],checklist:["Recognized partial (not failed) response","Identified new albuminuria and its implications","Considered SGLT2 inhibitor for cardiorenal protection","Considered GLP-1 RA aligned to weight goals","Confirmed injectable preference before deciding","Continued ACEi + statin appropriately","Planned renal monitoring + UACR recheck","Reinforced lifestyle and adherence gains"]},INTERVIEW_SYSTEM_PROMPT:'You are Maria Gonzalez at a 3-month follow-up. You feel cautiously encouraged but unsure if you are "where you need to be." You are friendly and cooperative. Speak plainly, never clinically. Do NOT volunteer hidden details (which med you miss, exact home values, diet changes, weight feelings, kidney understanding, injection preference) unless specifically asked. You are motivated by weight loss and frightened about your kidneys because of your mother. Keep answers short and natural.'},pf={id:"maria-thu",NOTE_META:{author:"Alex Rivera, PharmD Candidate (APPE)",preceptor:"M. Whitfield, PharmD, BCACP",dateTime:"Thursday, Week 1 · 14:00"},PATIENT:Go,ENCOUNTER:{day:"Thursday",type:"6-Month Follow-Up",week:"Week 1 — Thursday",length:"30-minute collaborative practice visit",difficulty:"Advanced APPE Student",difficultyTone:"red",diseaseStates:["CKD / ASCVD prevention","Type 2 Diabetes","Obesity","Preventive care"],chiefConcern:"My numbers are getting better, but I want to know what else I can do to stay healthy long-term.",snapshotSummary:"6-month follow-up. BP at goal, A1C near goal, weight down, but albuminuria persists. Focus shifts to long-term CKD/ASCVD risk reduction, agent selection, and closing preventive-care gaps.",learningObjectives:["Prioritize long-term cardiorenal/ASCVD risk reduction beyond A1C","Recognize persistent albuminuria despite good BP and ACEi therapy","Make a guideline-based case for SGLT2 inhibitor and/or GLP-1 RA","Correct the misconception that normal eGFR means healthy kidneys","Close preventive-care gaps (PCV, Shingrix, Tdap)"],priorChanges:["BP improved to 136/84 at prior visit; A1C to 7.5%","UACR 45 mg/g identified; LDL to 78 on statin","Weight loss achieved; adherence and technique improved"]},VITALS:{spo2:"98 %",pain:"1/10 (knees)",vitalsTime:"06/25/2026 08:52",trends:{bpSys:[134,131,128],weight:[88.1,87.3,86.5]},bp:"128/78 mmHg",bpRepeat:"126/78 mmHg",hr:"74 bpm",rr:"16",temp:"98.3 °F",weight:"86.5 kg",height:`5'4"`,bmi:"32.7 kg/m²",flags:{bp:"normal",bpRepeat:"normal",bmi:"warn",hr:"normal"},extras: y bloodwork means healthy kidneys. Is she right? How would you explain it?","Why should long-term decisions here NOT be driven by the A1C number alone?","Which therapy class best protects her kidneys long-term — and would also help her weight goal?","She’s open to a weekly injection and wants more weight loss. How does that shape your recommendation?","BP is 126/78 — does she need more BP medication?","LDL is 70 on a statin — continue, stop, or intensify?","What preventive-care gaps have been open for three visits now?","What is the single biggest long-term risk you’re trying to prevent, and how?"],COUNSELING:[{id:"kidney",title:"Kidney protection (long-term)",body:["Your kidney blood test is normal, which is great — but the urine test still shows a little protein.","That protein is an early warning sign, so we keep protecting your kidneys even though the bloodwork looks good.","A normal kidney blood test doesn’t mean the kidneys are fully in the clear — the urine test catches problems earlier."]},{id:"glp1",title:"GLP-1 receptor agonist",body:["A once-weekly injection can help with weight and sugar, and it’s good for the heart.","We start at a low dose; some nausea early on is common and usually fades.","Since weight loss is your goal and you’re comfortable with a weekly shot, this fits well."]},{id:"sglt2",title:"SGLT2 inhibitor",body:["A once-daily pill that protects the kidneys and heart and helps sugar.","You may urinate a bit more at first; stay hydrated and keep good hygiene to lower infection risk.","Tell us if you feel unwell, stop eating, or have genital itching — uncommon but worth knowing."]},{id:"immun",title:"Immunizations",body:["A few vaccines are still due — pneumonia, shingles, and a tetanus booster.","With diabetes, these protect you from infections that can hit harder.","We can take care of some today and schedule the rest."]},{id:"lifestyle",title:"Sustaining lifestyle gains",body:["Walking five days a week and cooking at home are fantastic — those habits are doing real work.","The goal now is keeping them going for the long haul, not perfection."]}],PRECEPTOR:{keyIssues:["BP at goal (126/78); A1C near goal (7.1%); −5.5 kg total.","PERSISTENT albuminuria (UACR 38) despite at-goal BP + ACE inhibitor.","Normal eGFR does NOT equal healthy kidneys — patient misconception to correct.","Strong indication remains for SGLT2 inhibitor (kidney/CV) and GLP-1 RA (weight/glycemia/CV).","Open preventive gaps: pneumococcal, Shingrix, Tdap."],assessment:['Do not treat the case as "finished" because numbers improved.',"Persistent albuminuria justifies kidney-protective therapy independent of A1C.","SGLT2 inhibitor is strongly relevant for long-term kidney and cardiovascular protection.","GLP-1 RA is highly relevant for weight loss, glycemia, and CV risk reduction; she is willing.","No additional antihypertensive needed while BP is at goal and therapy tolerated.","Continue statin (LDL 70); CV risk reduction extends beyond LDL."],plan:["Add SGLT2 inhibitor for kidney/CV protection; continue ACEi with SCr/K monitoring.","Consider GLP-1 RA aligned to weight goals and injection acceptance.","Continue metformin, lisinopril/HCTZ, atorvastatin.","Administer/refer pneumococcal, Shingrix, Tdap.",'Reinforce durable lifestyle; correct "normal eGFR = healthy kidneys" misconception.',"Continue UACR/BMP/A1C monitoring; follow up ~3 months."],pearls:["Persistent albuminuria with normal eGFR still warrants kidney-protective therapy.","Long-term care prioritizes CKD prevention, ASCVD prevention, weight, adherence sustainability, and preventive gaps.","Use the patient’s own goals (weight) as leverage for guideline-concordant therapy.","Close the preventive-care loop — gaps left open across visits are a quality miss."],mistakes:['Declaring the patient "controlled/cured" and de-escalating monitoring.',"Focusing only on A1C and missing the cardiorenal indication.","Reinforcing the misconception that normal eGFR means healthy kidneys.","Adding a nd measurement error. That single habit will save you from overtreating people."},{keywords:["james","cost","afford","expensive","copay","empagliflozin","never started","access","insurance"],response:"James is why I never trust an A1c in isolation. His chart said empagliflozin was active; his fill history said otherwise. A drug can't fail if it was never started. When you see a worrying number, ask 'are you actually taking this, and can you afford it?' — then solve the access problem before adding anything."},{keywords:["linda","ckd","kidney","albuminuria","uacr","prioritize","overwhelm","sequence","mi","stemi"],response:"Linda is about prioritization. CKD 3a, severe albuminuria, prior MI — every system is shouting. Lead with the therapy that protects the most organs at once (SGLT2i, then a cardiorenal GLP-1 RA), get her statin to an LDL under 55, and introduce it stepwise so she isn't buried. Prioritizing without overwhelming is the skill."},{keywords:["flow","glp","glp-1","semaglutide","trial","evidence"],response:"FLOW is the reframe: a GLP-1 RA reduced kidney failure and cardiovascular death in T2DM patients with CKD and albuminuria — a 24% relative risk reduction. So it's cardiorenal therapy, not a glucose drug. The skill is matching that evidence to the right patient — Linda — and not overstating it for someone like Maria with mild albuminuria."},{keywords:["sglt2","flozin","dapagliflozin","jardiance","farxiga"],response:"SGLT2 inhibitors buy you kidney protection, heart-failure benefit, and CV benefit. Expect a small early eGFR dip — that's protective, not a reason to stop. They're appropriate well into CKD; don't let an eGFR of 48 scare you off."},{keywords:["vs","versus","combine","both","difference","choose between"],response:"SGLT2i vs GLP-1 RA isn't usually either/or in a high-risk patient — their benefits are complementary and you can layer them. Let the phenotype lead: heavy CKD/HF tilts toward an SGLT2i first; obesity, ASCVD, and a need for bigger A1c dings to real-world pharmacist decision-making in patients with type 2 diabetes, chronic kidney disease, albuminuria, and cardiovascular risk.",citation:"Heerspink HJL, Stefánsson BV, Correa-Rotter R, et al. Dapagliflozin in Patients with Chronic Kidney Disease. N Engl J Med. 2020;383:1436–1446.",trial:{name:"DAPA-CKD",facts:[{label:"Drug",value:"Dapagliflozin 10 mg once daily"},{label:"Design",value:"Multicenter, randomized, double-blind, placebo-controlled"},{label:"Population",value:"Adults with CKD, with or without type 2 diabetes"},{label:"Sample size",value:"4,304 patients"},{label:"Median follow-up",value:"2.4 years"}],inclusion:["Age ≥18 years","eGFR 25–75 mL/min/1.73m²","UACR 200–5000 mg/g","Stable ACE inhibitor or ARB therapy ≥4 weeks unless contraindicated"],primaryEndpoint:["Sustained eGFR decline ≥50%","End-stage kidney disease","Death from renal causes","Death from cardiovascular causes"],primaryResult:[{label:"Dapagliflozin",value:"9.2%"},{label:"Placebo",value:"14.5%"},{label:"Hazard ratio",value:"0.61"},{label:"95% CI",value:"0.51–0.72"},{label:"p-value",value:"<0.001"},{label:"ARR",value:"5.3%"},{label:"NNT",value:"19"}],secondary:[{label:"Kidney-specific composite",value:"HR 0.56"},{label:"CV death or HF hospitalization",value:"HR 0.71"},{label:"All-cause mortality",value:"HR 0.69"}],safety:["Serious adverse events occurred less frequently with dapagliflozin than placebo","No significant increase in amputations","No significant increase in fractures","Diabetic ketoacidosis was rare","Overall safety profile favorable"]},questions:[{id:"q1",title:"Patient Eligibility and Trial Application",prompt:"A 58-year-old patient with type 2 diabetes, hypertension, and chronic kidney disease has an eGFR of 46 mL/min/1.73m² and a UACR of 620 mg/g. The patient is already taking lisinopril 20 mg daily and has stable renal function. Based on the DAPA-CKD trial, would this patient be an appropriate candidate for dapagliflozin? Explain your decision using the trial’s inclusion criteria, baseline therapy requirements, and expected clinical benefit.",answer:"Yes, this patient appears to be an appropriate candidate for dapagliflozin based on the DAPA-CKD trial population. The trial included adults with CKD who had an eGFR between 25 and 75 mL/min/1.73m² and a UACR between 200 and 5000 mg/g. This patient’s eGFR of 46 and UACR of 620 fall within those inclusion criteria. The patient is already receiving lisinopril, which aligns with the trial requirement that patients be on stable ACE inhibitor or ARB therapy for at least 4 weeks unless contraindicated. Since renal function is stable, dapagliflozin 10 mg once daily would be reasonable if no contraindications exist. The key benefit is not just glucose lowering; it is kidney and cardiovascular risk reduction. In DAPA-CKD, dapagliflozin reduced the composite risk of sustained eGFR decline of at least 50%, end-stage kidney disease, or renal/cardiovascular death compared with placebo."},{id:"q2",title:"Therapy Selection Beyond A1C",prompt:"A patient with type 2 diabetes has an A1C of 7.1%, eGFR of 52 mL/min/1.73m², UACR of 900 mg/g, and no history of hypoglycemia. The provider says, “Their A1C is almost at goal, so I do not think we need another diabetes medication.” How would you respond as the pharmacist? Explain how DAPA-CKD supports using an SGLT2 inhibitor for cardiorenal risk reduction rather than only for glucose lowering.",answer:"The pharmacist should explain that this decision should not be based only on A1C. Although the patient’s A1C is close to goal, the patient has significant albuminuria and CKD risk. DAPA-CKD supports use of dapagliflozin in eligible CKD patients because it reduced kidney disease progression and renal/cardiovascular death. The benefit was observed in patients with and without type 2 diabetes, which reinforces that the effect is not purely due to glucose lowering. In this patient, dapagliflozin should be considered as cardiorenal protective therapy, not merely as an additional diabetes medication. A strong pharmacist response would be: “Even though the A1C is close to goal, the kidneys remain at risk. Dapagliflozin may help slow kidney disease progression and reduce cardiovascular events independent of its effect on blood sugar.”"},{id:"q3",title:"Interpreting Benefit and Communicating Value",prompt:"In DAPA-CKD, the primary outcome occurred in 9.2% of patients receiving dapagliflozin compared with 14.5% receiving placebo, with a hazard ratio of 0.61 and an NNT of 19. How would you explain the clinical significance of these results to a primary care provider? Then explain how you would translate the same information into patient-friendly language for someone worried about kidney failure.",answer:"To a provider, the pharmacist should explain that dapagliflozin produced a clinically meaningful reduction in kidney disease progression and renal/cardiovascular death. The absolute risk reduction was 5.3%, and the NNT was 19, meaning that treating 19 similar patients for the study duration would prevent one primary outcome event. The hazard ratio of 0.61 suggests a 39% relative risk reduction in the composite outcome. The outcome included meaningful events such as sustained major eGFR decline, end-stage kidney disease, renal death, and cardiovascular death. To a patient, the pharmacist should avoid overly technical language and say something like: “This medication has been shown to help protect the kidneys and lower the chance of serious kidney problems getting worse. It does not cure kidney disease, but it can help slow it down and protect you over time.”"},{id:"q4",title:"Safety and Monitoring in Practice",prompt:"A patient who meets DAPA-CKD eligibility criteria is started on dapagliflozin. They also take lisinopril and hydrochlorothiazide and report occasional lightheadedness when standing. What safety concerns would you assess before and after initiation? Include monitoring for renal function, volume status, blood pressure, genital/urinary symptoms, diabetic ketoacidosis risk, and when the medication may need to be temporarily held.",answer:"Before starting dapagliflozin, the pharmacist should assess baseline renal function, eGFR, electrolytes, blood pressure, volume status, orthostatic symptoms, and current diuretic use. Because the patient is taking hydrochlorothiazide and reports lightheadedness, volume depletion or orthostatic hypotension should be considered. After initiation, monitor renal function and eGFR, recognizing that a small early eGFR dip may occur but long-term kidney effects are protective. Monitor blood pressure and symptoms of dehydration, especially with concurrent ACE inhibitor and diuretic therapy. Counsel on genital mycotic infections and urinary symptoms, including burning, itching, unusual discharge, fever, flank pain, or persistent symptoms. Counsel on rare diabetic ketoacidosis symptoms such as nausea, vomiting, abdominal pain, shortness of breath, severe fatigue, or feeling very sick even if glucose is not extremely high. Dapagliflozin may need to be temporarily held during acute illness, dehydration, vomiting, poor oral intake, prolonged fasting, or before major surgery/procedures depending on local protocol."},{id:"q5",title:"Limits of Evidence and Patient-Specific Decision-Making",prompt:"A 70-year-old patient with CKD has an eGFR of 58 mL/min/1.73m² but a UACR of only 45 mg/g. The provider asks whether DAPA-CKD proves this patient should receive dapagliflozin. How would you evaluate whether the trial applies to this patient? Discuss the trial’s albuminuria requirement, generalizability limits, potential guideline evolution, and what other patient-specific factors would influence your recommendation.",answer:"DAPA-CKD does not directly prove benefit for this exact patient because the trial required a UACR of 200–5000 mg/g. This patient’s UACR of 45 mg/g is below the albuminuria range studied in the trial. Although the patient’s eGFR fits the trial’s eGFR range, the low UACR means the patient is outside the core DAPA-CKD population. The pharmacist should avoid overstating the evidence. A strong response would distinguish direct trial evidence from broader guideline-based application. Other factors to consider include current guideline recommendations, diabetes status, cardiovascular risk, heart failure history, kidney disease progression, tolerability, cost, volume status, fall risk, and patient preferences. If therapy is recommended, it should be framed as based on broader evidence or guideline evolution rather than DAPA-CKD alone."}]},gg=[{key:"needs",label:"Needs improvement"},{key:"meets",label:"Meets expectations"},{key:"strong",label:"Strong clinical reasoning"}];function yg(e,t){const n=(t==null?void 0:t.responses)||{},i=e.questions.filter(r=>(n[r.id]||"").trim().length>0).length;return{answered:i,total:e.questions.length,complete:i===e.questions.length}}function xg({onBack:e,config:t=fg}){const n=t.id,[i,r]=_.useState(()=>{const f=pe(n);return{responses:{},revealed:{},ratings:{},...f}}),l=_.useCallback(f=>{r(k=>{const L=f({...k});return An(n,L),L})},[n]),o=(f,k)=>l(L=>({...L,responses:{...L.responses,[f]:k}})),s=f=>l(k=>({...k,revealed:{...k.revealed,[f]:!k.revealed[f]}})),d=(f,k)=>l(L=>({...L,ratings:{...L.ratings,[f]:k}})),{answered:c,total:y,complete:m}=yg(t,i),p=t.trial,x=t;return a.jsxs("div",{className:"min-h-screen bg-slate-100",children:[a.jsx("header",{className:"text-white",style:{background:"linear-gradient(135deg,#13314f,#0d2138)"},children:a.jsxs("div",{className:"max-w-4xl mx-auto px-6 py-5 flex items-center gap-3",children:[a.jsx("button",{onClick:e,className:"grid place-items-center w-9 h-9 rounded-lg bg-white/10 hover:bg-white/20 transition shrink-0",children:a.jsx(Vt,{size:18})}),a.jsxs("div",{children:[a.jsxs("div",{className:"flex items-center gap-2",children:[a.jsx(_i,{size:18,className:"text-teal-200"}),a.jsx("h1",{className:"font-head text-2xl",children:x.title})]}),a.jsx("p",{cl
